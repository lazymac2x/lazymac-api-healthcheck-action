name: Release v1
on:
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - 'README.md'
permissions:
  contents: write
jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Move v1 tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa v1 -m "v1"
          git push origin v1 --force
